suite: Test RBAC Rendering
templates:
  - templates/deployment.yaml

tests:

  - it: should create ServiceAccount with correct name
    set:
      common.name: cdi-dra
      common.image: "dummy-image"
      common.imagePullPolicy: IfNotPresent
      global:
        fti_cdi:
          hostAliases: []
          env:
            CDI_ENDPOINT: "http://dummy-endpoint"
            TENANT_ID: "tenant-123"
    documentSelector:
      path: kind
      value: ServiceAccount
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: cdi-dra

  - it: should create ClusterRoleBinding with correct name and subject
    set:
      common.name: cdi-dra
      common.image: "dummy-image"
      common.imagePullPolicy: IfNotPresent
      global:
        fti_cdi:
          hostAliases: []
          env:
            CDI_ENDPOINT: "http://dummy-endpoint"
            TENANT_ID: "tenant-123"
    documentSelector:
      path: kind
      value: ClusterRoleBinding
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: cdi-dra-binding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: cdi-dra
