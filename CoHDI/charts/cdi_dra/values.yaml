name: cdi-dra

createNamespace: true
namespace: composable-dra

replicaCount: 1

image: "10.38.251.227:5000/cdi-dra:v18-e89254c"
imagePullPolicy: IfNotPresent

hostAliases:
  - ip: 192.168.1.101
    hostnames:
      - cdimgr.localdomain

env:
  USE_CAPI_BMH: "false"
  USE_CM: "false"
  SCAN_INTERVAL: "5s"

configmap:
  name: composable-dra-dds
  labelPrefix: "cohdi.io"
  fabricIdRange: "[0]"
  deviceInfo: |
    - index: 1
      cdi-model-name: "a100"
      dra-attributes:
        productName: "NVIDIA A100 80GB PCIe"
      driver-name: "gpu-nvidia-com"
      k8s-device-name: "nvidia-a100-80"
      cannot-coexist-with: [2,3]
    - index: 2
      cdi-model-name: "L40S"
      dra-attributes:
        productName: "NVIDIA L40S"
      driver-name: "gpu-nvidia-com"
      k8s-device-name: "nvidia-l40s"
      cannot-coexist-with: [1,3]
    - index: 3
      cdi-model-name: "a30"
      dra-attributes:
        productName: "NVIDIA A30"
      driver-name: "gpu-nvidia-com"
      k8s-device-name: "nvidia-a30"
      cannot-coexist-with: [1,2]

secret:
  name: composable-dra-secret



