{{- /*
Creates:
1) Namespace for credentials (optional)
2) Opaque 'credentials' Secret in that namespace
3) TLS Secret for the webhook cert/key in the operator system namespace
4) Opaque Secret with external CA (ca.crt) in the operator system namespace
*/ -}}

{{- if .Values.credentials.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.credentials.namespace }}
---
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.credentials.secretName }}
  namespace: {{ .Values.credentials.namespace }}
type: Opaque
stringData:
  username: {{ .Values.credentials.username | quote }}
  password: {{ .Values.credentials.password | quote }}
  client_id: {{ .Values.credentials.client_id | quote }}
  client_secret: {{ .Values.credentials.client_secret | quote }}
  realm: {{ .Values.credentials.realm | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.tls.secretName }}
  namespace: {{ .Values.operator.systemNamespace }}
type: kubernetes.io/tls
stringData:
  tls.crt: |
{{- nindent 4 .Values.webhook.tls.crt }}
  tls.key: |
{{- nindent 4 .Values.webhook.tls.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.externalCA.secretName }}
  namespace: {{ .Values.operator.systemNamespace }}
type: Opaque
stringData:
  ca.crt: |
{{- nindent 4 .Values.webhook.externalCA.crt }}
