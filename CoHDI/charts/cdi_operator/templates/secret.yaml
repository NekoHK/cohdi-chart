apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.credentials.secretName }}
  namespace: composable-resource-operator-system
type: Opaque
stringData:
  username: {{ .Values.global.credentials.username | quote }}
  password: {{ .Values.global.credentials.password | quote }}
  client_id: {{ .Values.global.credentials.client_id | quote }}
  client_secret: {{ .Values.global.credentials.client_secret | quote }}
  realm: {{ .Values.global.credentials.realm | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.server.secretName }}
  namespace: composable-resource-operator-system
type: kubernetes.io/tls
stringData:
  tls.crt: |
{{- nindent 4 .Values.webhook.server.crt }}
  tls.key: |
{{- nindent 4 .Values.webhook.server.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.externalCA.secretName }}
  namespace: composable-resource-operator-system
type: Opaque
stringData:
  ca.crt: |
{{- nindent 4 .Values.global.externalCA.certificate }}
