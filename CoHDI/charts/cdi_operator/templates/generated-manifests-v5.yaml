apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: composable-resource-operator
    control-plane: controller-manager
  name: composable-resource-operator-controller-manager
  namespace: composable-resource-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        image: {{ .Values.image | quote }}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        env:
        - name: CDI_PROVIDER_TYPE
          value: "FTI_CDI"
        - name: DEVICE_RESOURCE_TYPE
          value: "DRA"
        - name: FTI_CDI_API_TYPE
          value: "FM"
        - name: FTI_CDI_ENDPOINT
          value: "192.168.1.101:443"
        - name: FTI_CDI_TENANT_ID
          value: "060ea5a5-46e4-42b4-8d95-70578718d8d0"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/custom-ca/ca.crt"
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        - mountPath: /etc/ssl/certs/custom-ca
          name: custom-ca-certs
          readOnly: true
        - mountPath: /host/tmp
          name: host-tmp
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: composable-resource-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
      - name: custom-ca-certs
        secret:
          secretName: external-server-ca-cert
          defaultMode: 420
      - hostPath:
          path: /tmp
          type: Directory
        name: host-tmp
---
