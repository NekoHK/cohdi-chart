{{- /*
No defaults: all required values must be provided in values.yaml.
This template will fail-fast if a required key is missing.
*/ -}}

{{- /* required scalar values */ -}}
{{- $ns := required "Values.namespace is required" .Values.namespace -}}
{{- $name := required "Values.name is required" .Values.name -}}
{{- $saName := required "Values.serviceAccount.name is required" .Values.serviceAccount.name -}}
{{- $deployName := required "Values.deploymentName is required" .Values.deploymentName -}}
{{- $image := required "Values.image is required" .Values.image -}}
{{- $imagePullPolicy := required "Values.imagePullPolicy is required" .Values.imagePullPolicy -}}
{{- $replicas := required "Values.replicaCount is required" .Values.replicaCount -}}
{{- $tgps := required "Values.terminationGracePeriodSeconds is required" .Values.terminationGracePeriodSeconds -}}

{{- /* enforce that rbac.enabled is explicitly set (true/false), not omitted */ -}}
{{- if not (and (hasKey .Values "rbac") (hasKey .Values.rbac "enabled")) -}}
{{- fail "Values.rbac.enabled must be set (true or false)" -}}
{{- end -}}
{{- $rbacEnabled := .Values.rbac.enabled -}}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $ns }}
  {{- if and (hasKey .Values "labels") .Values.labels }}
  labels:
  {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
---
{{- if $rbacEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ required "Values.rbac.clusterRoleName is required when rbac.enabled=true" .Values.rbac.clusterRoleName }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get","list","patch","update"]
- apiGroups: ["cro.hpsys.ibm.ie.com"]
  resources: ["composabilityrequests","composableresources"]
  verbs: ["create","delete","get","list","patch","update","watch"]
- apiGroups: ["cro.hpsys.ibm.ie.com"]
  resources: ["composabilityrequests/status","composableresources/status"]
  verbs: ["get","patch","update"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims","resourceslices"]
  verbs: ["get","list","patch","update","watch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims/status","resourceslices/status"]
  verbs: ["get","patch","update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ required "Values.rbac.clusterRoleBindingName is required when rbac.enabled=true" .Values.rbac.clusterRoleBindingName }}
  {{- if and (hasKey .Values "labels") .Values.labels }}
  labels:
  {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ required "Values.rbac.clusterRoleName is required when rbac.enabled=true" .Values.rbac.clusterRoleName }}
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $ns }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $deployName }}
  namespace: {{ $ns }}
  {{- if and (hasKey .Values "labels") .Values.labels }}
  labels:
  {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: {{ $saName }}
      terminationGracePeriodSeconds: {{ $tgps }}
      containers:
        - name: {{ $name }}
          image: {{ $image | quote }}
          imagePullPolicy: {{ $imagePullPolicy }}
          command:
            - /dynamic-device-scaler
          {{- if .Values.args }}
          args:
          {{- range .Values.args }}
            - {{ . | quote }}
          {{- end }}
          {{- end }}
          {{- if .Values.env }}
          env:
          {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
          {{- end }}
          {{- end }}
